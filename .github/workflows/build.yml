name: GKI-Duchamp Builder

on:
  workflow_call:
    inputs:
      TODO:
        type: string
      KSU:
        type: string
      KSU_SUSFS:
        type: string
      LAST_BUILD:
        type: string
      KERNEL_VERSION:
        type: string
      STATUS:
        type: string

  workflow_dispatch:
    inputs:
      TODO:
        description: To do
        default: ""
        type: choice
        options:
          - "kernel"
          - "defconfig"

      KSU:
        description: KernelSU Type
        default: "yes"
        type: choice
        options:
          - "no"
          - "yes"

      KSU_SUSFS:
        description: Include SUSFS?
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

      KERNEL_VERSION:
        description: Which kernel version do you want to build?
        default: "6.1"
        type: choice
        options:
          - "6.6"
          - "6.1"
          - "5.10"

env:
  MAN_DISABLE: true
  DEBIAN_FRONTEND: noninteractive

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Determine Build Status
        run: |
          if [ -n "${{ inputs.STATUS }}" ]; then
            echo "STATUS=${{ inputs.STATUS }}" >> $GITHUB_ENV
          elif [ "${{ toJson(github.event.inputs) }}" == "null" ]; then
            echo "STATUS=RELEASE" >> $GITHUB_ENV
          else
            echo "STATUS=RELEASE" >> $GITHUB_ENV
          fi

      - name: Validate Inputs and Secrets
        env:
          #TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }} # telegram chat id
          #TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }} # telegram bot token
          #GH_TOKEN: ${{ secrets.GH_TOKEN }} # github token
          KSU: ${{ inputs.KSU }}
          KSU_SUSFS: ${{ inputs.KSU_SUSFS }}
          KERNEL_REPO: ${{ secrets.KERNEL_REPO }}
        run: |
          _error() {
              echo "❌ ERROR: $*"
              let ret++
          }

          ret=0

          # KernelSU Validation (Supports yes, no, resukisu)
          if [[ $KSU == "no" && $KSU_SUSFS == "true" ]]; then
              _error "Cannot use SuSFS without KernelSU"
          fi
          # ReSukiSU membutuhkan SUSFS aktif untuk patch kompatibilitas 6.1/6.6
          if [[ $KSU == "resukisu" && $KSU_SUSFS != "true" ]]; then
              _error "ReSukiSU build requires KSU_SUSFS to be true"
          fi

          if [[ $ret -gt 0 ]]; then
            exit $ret
          fi

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gh bc bison flex libssl-dev libelf-dev dwarves cpio
          pip install lxml

      - name: Run Build Script
        env:
          #TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }} # telegram chat id
          #TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }} # telegram bot token
          #GH_TOKEN: ${{ secrets.GH_TOKEN }} # github token
          KERNEL_REPO: ${{ secrets.KERNEL_REPO }}
          KSU: ${{ inputs.KSU }}
          KSU_SUSFS: ${{ inputs.KSU_SUSFS }}
          LAST_BUILD: ${{ inputs.LAST_BUILD }}
          TODO: ${{ inputs.TODO }}
          STATUS: ${{ env.STATUS }} # Mengambil nilai dari step Determine Build Status
          KVER: ${{ inputs.KERNEL_VERSION }} # This passes the version to the script
        run: |
          export GIT_CLONE_PROTECTION_ACTIVE=false
          chmod +x *.sh py/*.py
          ./build.sh

      - name: Upload Artifacts (ZIP & IMG)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BASE_NAME }}-${{ github.run_number }}
          path: |
            artifacts/*.zip
            artifacts/*.img

      - name: Upload Artifacts (Info File)
        uses: actions/upload-artifact@v4
        with:
          name: info-${{ github.run_number }}
          path: artifacts/*.txt

      - name: Generate Checksums
        run: |
          cd artifacts
          sha256sum *.zip > checksums.txt
          md5sum *.zip > checksums-md5.txt
          CHECKSUMS=$(cat checksums.txt)
          CHECKSUMS="${CHECKSUMS//'%'/'%25'}"
          CHECKSUMS="${CHECKSUMS//$'\n'/'%0A'}"
          CHECKSUMS="${CHECKSUMS//$'\r'/'%0D'}"
          echo "CHECKSUMS=$CHECKSUMS" >> $GITHUB_ENV


      - name: Upload All Builds to release repo
        uses: softprops/action-gh-release@v2
        with:
          repository: ${{ env.RELEASE_REPO }}
          name: ${{ env.RELEASE_NAME }}
          tag_name: ${{ env.RELEASE }}-r${{ github.run_number }}
          prerelease: true
          files: |
            artifacts/*.zip
            artifacts/checksums.txt
            artifacts/checksums-md5.txt
          body: |
            ### 📢 ${{ env.RELEASE_NAME }}
            
            **Build Information:**
            - 🐧 **Kernel:** ${{ env.KERNEL_NAME }}
            - 🔖 **Version:** ${{ env.LINUX_VERSION }} (android14-6.1-lts)
            - 🔰 **Variant:** SukiSU Ultra
            - 🛡️ **SuSFS:** ${{ env.SUSFS_VERSION }}
            
            ---
            **Compiler:** ${{ env.COMPILER_STRING }}
            
            **Checksums:**
            ```
            ${{ env.CHECKSUMS }}
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # Built-in token, no need to set manually